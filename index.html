<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pashto AI Song Generator</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  display:flex;
  justify-content:center;
  padding:40px;
}

.container {
  background:#ffffff10;
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:20px;
  width:420px;
}

h1 { text-align:center; }

label { margin-top:15px; display:block; }

textarea, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

textarea { height:100px; }

button {
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c9ff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover { background:#00aacc; }

#result {
  margin-top:20px;
  text-align:center;
  display:none;
}

#downloadBtn { display:none; }

.instruments label { display:block; }
</style>

</head>
<body>

<div class="container">
  <h1>🎵 Pashto AI Song Generator</h1>
  <p>Create Pashto Folk Songs from Lyrics</p>

  <label>Select Language</label>
  <select id="language">
    <option value="Pashto">Pashto</option>
    <option value="English">English</option>
  </select>

  <label>Select Singer Voice</label>
  <select id="singer">
    <option>Male Deep Voice</option>
    <option>Male Soft Voice</option>
    <option>Female Soft Voice</option>
  </select>

  
  <label>Enter Lyrics (Pashto or Roman Pashto)</label>
  <textarea id="lyrics" maxlength="5000"></textarea>

  <label>Song Style Prompt</label>
  <textarea id="style" maxlength="2000"
  placeholder="Example: Traditional folk ghazal, Raag Gara, emotional, soulful"></textarea>

  <button onclick="generateSong()">🎶 Generate Song</button>

  <div id="result"></div>
  <button id="downloadBtn" onclick="downloadSong()">⬇ Download Song</button>
</div>

<script>
function generateSong() {
  let lyrics = document.getElementById("lyrics").value;
  let style = document.getElementById("style").value;
  let singer = document.getElementById("singer").value;
  let language = document.getElementById("language").value;

  if (lyrics.trim() === "") {
    alert("Please enter lyrics!");
    return;
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("downloadBtn").style.display = "block";

  document.getElementById("result").innerHTML =
  "🎧 Song Generated Successfully<br><br>" +
  "<b>Language:</b> " + language + "<br>" +
  "<b>Singer:</b> " + singer + "<br>" +
  "<b>Style:</b> " + style + "<br><br>" +
  "Your Pashto AI song is ready!";
}

function downloadSong() {
  let lyrics = document.getElementById("lyrics").value;
  let style = document.getElementById("style").value;

  let text = "PASHTO AI SONG\n\nLyrics:\n" + lyrics + "\n\nStyle:\n" + style;

  let blob = new Blob([text], { type: "text/plain" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Pashto-AI-Song.txt";
  link.click();
}
</script>

</body>
</html>
